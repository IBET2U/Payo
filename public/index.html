<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Payo</title>
  <style>
    :root{
      --bg:#0b141a;
      --primary:#00a884;
      --card:#1f2c34;
      --text:#e9edef;
      --muted:#8696a0;
      --border:#2a3942;
      --danger:#ef4444;
      --warn:#f59e0b;
      --ok:#22c55e;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100dvh;
      display:flex;
      justify-content:center;
    }
    .shell{
      width:100%;
      max-width:480px;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      position:relative;
    }
    .hidden{display:none !important}

    /* Shared */
    .topbar{
      flex-shrink:0;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid var(--border);
      background:rgba(31,44,52,.92);
      backdrop-filter: blur(8px);
      position:sticky;
      top:0;
      z-index:10;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      letter-spacing:.2px;
    }
    .pbadge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,#0fd6aa, #00a884);
      display:flex;align-items:center;justify-content:center;
      color:#06221a;font-weight:900;
    }
    .spacer{flex:1}
    .iconbtn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      border-radius:12px;
      padding:8px 10px;
      font-size:13px;
      cursor:pointer;
      transition: all .18s ease;
    }
    .iconbtn:hover{border-color:#3b4a53}
    .avatar{
      width:34px;height:34px;border-radius:50%;
      background:linear-gradient(135deg,#00a884,#007c62);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;color:#042018;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
    }
    .btn{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:12px 14px;
      border-radius:14px;
      font-weight:700;
      cursor:pointer;
      transition: transform .08s ease, filter .18s ease;
    }
    .btn:active{transform:scale(.98)}
    .btn.secondary{
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
    }
    .btn.ghost{
      background:transparent;
      color:var(--muted);
      border:none;
      padding:10px 8px;
      font-weight:600;
    }
    .input{
      width:100%;
      border:1px solid var(--border);
      background:#121f27;
      color:var(--text);
      border-radius:14px;
      padding:14px 14px;
      font-size:16px;
      outline:none;
    }
    .input:focus{border-color:#2d907a}
    .muted{color:var(--muted)}
    .row{display:flex;gap:10px;align-items:center}
    .col{display:flex;flex-direction:column;gap:10px}
    .screen{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:14px 16px 92px;
      animation: slideIn .22s ease;
    }
    @keyframes slideIn{
      from{transform:translateX(10px);opacity:.7}
      to{transform:translateX(0);opacity:1}
    }
    .nav{
      position:sticky;
      bottom:0;
      background:rgba(31,44,52,.92);
      border-top:1px solid var(--border);
      padding:10px 10px 14px;
      display:flex;
      gap:8px;
      justify-content:space-around;
      backdrop-filter: blur(8px);
      z-index:9;
    }
    .nav .tab{
      flex:1;
      text-align:center;
      padding:10px 8px;
      border-radius:14px;
      color:var(--muted);
      border:1px solid transparent;
      cursor:pointer;
      font-size:12px;
      transition: all .18s ease;
    }
    .nav .tab.active{
      color:var(--text);
      border-color:var(--border);
      background:#14222a;
    }
    .nav .tab span{display:block;font-size:18px;margin-bottom:4px}

    /* Auth */
    #auth-screen{padding:22px 16px 40px}
    .authBrand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:18px;margin-bottom:18px}
    .authBrand h1{font-size:22px}
    .authBrand p{font-size:13px;color:var(--muted);text-align:center;max-width:320px;line-height:1.35}
    #clerk-auth{width:100%;max-width:420px;margin:0 auto}
    #auth-loading{color:var(--muted);text-align:center;margin-top:16px}

    /* Home */
    .balanceCard{
      padding:16px;
      background:linear-gradient(135deg,#0e3d33,#0a2c24 55%, #081f1a);
      border:1px solid rgba(0,168,132,.35);
    }
    .balanceTop{display:flex;align-items:flex-start;gap:10px}
    .balanceTop .greet{font-weight:800;font-size:16px}
    .balanceLabel{font-size:12px;color:#ccefe7;margin-top:2px}
    .balanceAmt{font-size:34px;font-weight:900;letter-spacing:-.5px;margin-top:8px}
    .balanceActions{display:flex;gap:10px;margin-top:12px}
    .miniBtn{
      flex:1;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.12);
      color:var(--text);
      font-weight:700;
      cursor:pointer;
      transition: all .18s ease;
    }
    .miniBtn:hover{filter:brightness(1.05)}

    /* Earnings tier bar */
    .earningsCard{
      margin-top:14px;
      padding:14px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
    }
    .earningsTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .earningsTop .label{font-size:12px;color:var(--muted);font-weight:700}
    .tierBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.4px;
      border:1px solid rgba(255,255,255,.12);
      color:#111;
    }
    .tierBadge .dot{width:8px;height:8px;border-radius:50%}
    .earningsAmt{font-size:15px;font-weight:900;margin-bottom:10px}
    .earningsAmt span{color:var(--primary)}
    .progressTrack{
      height:8px;
      border-radius:999px;
      background:#121f27;
      border:1px solid var(--border);
      overflow:hidden;
      margin-bottom:10px;
    }
    .progressFill{
      height:100%;
      border-radius:999px;
      width:0%;
      transition:width .5s ease;
    }
    .earningsHint{
      font-size:12px;
      line-height:1.4;
      color:var(--text);
      font-weight:600;
    }
    .earningsHint strong{color:var(--primary)}
    .earningsFoot{
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
    .earningsInfo{font-size:11px;color:var(--muted)}
    .shareTierBtn{
      border:1px solid var(--border);
      background:#14222a;
      color:var(--text);
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      cursor:pointer;
      transition:all .18s ease;
    }
    .shareTierBtn:hover{border-color:#3b4a53}

    /* Tier celebration */
    .tierCelebration{
      position:fixed;
      inset:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(11,20,26,.88);
      backdrop-filter:blur(6px);
      animation:fadeIn .25s ease;
    }
    .tierCelebration canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }
    .tierCelebrationInner{
      position:relative;
      z-index:2;
      text-align:center;
      padding:24px 20px;
      max-width:320px;
    }
    .tierCelebrationInner h2{
      font-size:26px;
      font-weight:1000;
      margin-bottom:10px;
      line-height:1.2;
    }
    .tierCelebrationInner p{
      font-size:14px;
      color:var(--muted);
      line-height:1.45;
    }
    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    .actionGrid{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .actionGridRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .actionGridRow.cols3{
      grid-template-columns:1fr 1fr 1fr;
    }
    .toggleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 0;
      border-bottom:1px solid var(--border);
    }
    .toggleRow:last-child{border-bottom:none}
    .toggleLabel{font-weight:700;font-size:14px}
    .toggleSub{font-size:12px;color:var(--muted);margin-top:2px}
    .toggle{
      position:relative;
      width:48px;height:28px;
      flex-shrink:0;
    }
    .toggle input{opacity:0;width:0;height:0}
    .toggleSlider{
      position:absolute;inset:0;
      background:#2a3942;
      border-radius:28px;
      cursor:pointer;
      transition:background .2s;
    }
    .toggleSlider:before{
      content:'';
      position:absolute;
      width:22px;height:22px;
      left:3px;top:3px;
      background:#fff;
      border-radius:50%;
      transition:transform .2s;
    }
    .toggle input:checked + .toggleSlider{background:var(--primary)}
    .toggle input:checked + .toggleSlider:before{transform:translateX(20px)}
    .typeToggle{
      display:flex;
      gap:8px;
      margin-bottom:14px;
    }
    .typeToggle button{
      flex:1;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#14222a;
      color:var(--muted);
      font-weight:700;
      font-size:13px;
      cursor:pointer;
    }
    .typeToggle button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }
    .vatPreview{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
      padding:10px;
      background:#121f27;
      border-radius:12px;
    }
    .checkoutBadge{
      display:inline-block;
      font-size:11px;
      font-weight:800;
      padding:3px 8px;
      border-radius:8px;
      margin-left:6px;
    }
    .checkoutBadge.digital{background:rgba(212,160,23,.2);color:#d4a017}
    .checkoutBadge.physical{background:rgba(0,168,132,.15);color:var(--primary)}
    .checkoutBadge.sales{background:rgba(34,197,94,.15);color:var(--ok)}
    .action{
      padding:14px 12px;
      border-radius:16px;
      background:#14222a;
      border:1px solid var(--border);
      cursor:pointer;
      transition: transform .08s ease, border-color .18s ease;
      min-height:78px;
    }
    .action:active{transform:scale(.99)}
    .action .emoji{font-size:22px}
    .action .title{margin-top:8px;font-weight:800}
    .action .sub{margin-top:2px;font-size:12px;color:var(--muted)}
    .action.quickLink{
      background:linear-gradient(135deg,#18f1c1,#00a884 55%,#007c62);
      border:1px solid rgba(0,168,132,.5);
      box-shadow:0 8px 24px rgba(0,168,132,.2);
      display:flex;
      align-items:center;
      gap:14px;
      min-height:72px;
      padding:16px 14px;
    }
    .action.quickLink .emoji{font-size:28px;margin:0}
    .action.quickLink .quickLinkText{flex:1;text-align:left}
    .action.quickLink .title{margin-top:0;color:#06221a}
    .action.quickLink .sub{color:rgba(6,34,26,.78)}

    .curToggle{
      display:flex;
      gap:8px;
      margin-bottom:14px;
    }
    .curToggle button{
      flex:1;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#14222a;
      color:var(--muted);
      font-weight:800;
      cursor:pointer;
      transition:all .18s ease;
    }
    .curToggle button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }
    .quickAmountInput{
      font-size:38px;
      font-weight:900;
      text-align:center;
      letter-spacing:-.5px;
      padding:18px 14px;
    }
    .linkUrlBox{
      word-break:break-all;
      font-size:13px;
      line-height:1.45;
      padding:14px;
      background:#121f27;
      border:1px solid var(--border);
      border-radius:14px;
      margin:12px 0;
    }
    .btn.copyLarge{
      width:100%;
      padding:16px;
      font-size:16px;
      margin-bottom:10px;
    }
    .btn.waShare{
      width:100%;
      padding:16px;
      font-size:16px;
      background:linear-gradient(135deg,#25d366,#128c7e);
      color:#fff;
      border:none;
      font-weight:800;
    }
    .btn.waShare:hover{filter:brightness(1.05)}
    .createAnother{
      display:block;
      text-align:center;
      margin-top:16px;
      color:var(--primary);
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }

    .sectionTitle{margin-top:18px;margin-bottom:10px;font-size:14px;font-weight:900;letter-spacing:.2px}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{
      padding:12px;
      display:flex;align-items:center;gap:10px;
      border-radius:16px;
      border:1px solid var(--border);
      background:#121f27;
    }
    .item .badge{
      width:40px;height:40px;border-radius:50%;
      background:#0f2a22;
      border:1px solid rgba(0,168,132,.35);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;color:#7ff0d6;
      flex-shrink:0;
    }
    .item .meta{flex:1;min-width:0}
    .item .meta .name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item .meta .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .item .amt{font-weight:900}
    .amt.ok{color:var(--ok)}
    .amt.warn{color:var(--warn)}
    .amt.out{color:var(--danger)}

    /* Floating AI */
    .aiFab{
      position:fixed;
      right:18px;
      bottom:86px;
      width:58px;height:58px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%,#18f1c1, #00a884 55%, #007c62);
      border:1px solid rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(0,0,0,.35);
      animation:pulse 1.7s ease-in-out infinite;
      z-index:50; /* below the chat input (z-index:100) */
    }
    .aiFab span{
      font-weight:1000;
      font-size:20px;
      color:#06221a;
      letter-spacing:.3px;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1); box-shadow:0 14px 30px rgba(0,0,0,.35)}
      50%{transform:scale(1.03); box-shadow:0 18px 40px rgba(0,168,132,.18)}
    }

    /* Chat */
    .chatWrap{
      height:calc(100dvh - 54px);
      display:flex;flex-direction:column;
    }
    .chatBody{
      flex:1;
      overflow:auto;
      padding:14px 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      background:var(--bg) url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23111b21' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .bubble{
      max-width:85%;
      padding:10px 12px;
      border-radius:14px;
      font-size:14.5px;
      line-height:1.42;
      word-wrap:break-word;
    }
    .received{align-self:flex-start;background:#005c4b;border-top-left-radius:6px}
    .sent{align-self:flex-end;background:#fff;color:#111b21;border-top-right-radius:6px}
    .bubble .time{font-size:11px;color:rgba(255,255,255,.7);text-align:right;margin-top:6px}
    .sent .time{color:#667781}
    .chatFoot{
      padding:10px;
      background:rgba(31,44,52,.92);
      border-top:1px solid var(--border);
      display:flex;
      gap:10px;
      align-items:flex-end;
      position:relative;
      z-index:100; /* always above the floating P button */
    }
    textarea{
      resize:none;
      max-height:140px;
      min-height:44px;
    }

    /* Success */
    .center{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
      padding:28px 16px;
    }
    .check{
      width:92px;height:92px;border-radius:50%;
      background:rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.35);
      display:flex;align-items:center;justify-content:center;
      margin-bottom:14px;
      animation:pop .25s ease;
    }
    @keyframes pop{from{transform:scale(.9);opacity:.6}to{transform:scale(1);opacity:1}}
    .check svg{width:50px;height:50px;fill:var(--ok)}
    .pillRow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
    .pill{
      padding:10px 12px;border-radius:999px;border:1px solid var(--border);
      background:#14222a;color:var(--text);font-weight:700;cursor:pointer;
    }

    /* Community */
    .communityHeader{
      margin-bottom:14px;
    }
    .communityHeader h2{
      font-size:20px;
      font-weight:900;
      letter-spacing:.2px;
    }
    .communityHeader p{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
    }
    .postWinBtn{
      width:100%;
      margin-bottom:14px;
      padding:14px;
      font-size:15px;
      background:linear-gradient(135deg,#18f1c1,#00a884 55%,#007c62);
      border:none;
      color:#06221a;
      font-weight:900;
    }
    .communityFeed{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .communityCard{
      padding:14px;
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--card);
    }
    .communityCardTop{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .tierAvatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:#14222a;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      flex-shrink:0;
    }
    .communityMeta{
      flex:1;
      min-width:0;
    }
    .communityName{
      font-weight:900;
      font-size:15px;
    }
    .communityCity{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }
    .communityTime{
      font-size:11px;
      color:var(--muted);
      margin-top:2px;
    }
    .communityMessage{
      margin-top:12px;
      font-size:14px;
      line-height:1.45;
    }
    .communityAmount{
      margin-top:8px;
      font-size:18px;
      font-weight:900;
      color:#ffd700;
    }
    .communityReactions{
      display:flex;
      gap:8px;
      margin-top:12px;
      flex-wrap:wrap;
    }
    .reactionBtn{
      border:1px solid var(--border);
      background:#121f27;
      color:var(--text);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:all .18s ease;
    }
    .reactionBtn:hover{
      border-color:#3b4a53;
      background:#14222a;
    }
    .reactionBtn:active{
      transform:scale(.98);
    }
    .communityEmpty{
      text-align:center;
      padding:32px 16px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }
    .communityModal{
      position:fixed;
      inset:0;
      z-index:50;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      background:rgba(11,20,26,.75);
      backdrop-filter:blur(4px);
    }
    .communityModalInner{
      width:100%;
      max-width:480px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px 20px 0 0;
      padding:18px 16px 24px;
      animation:slideUp .22s ease;
    }
    @keyframes slideUp{
      from{transform:translateY(20px);opacity:.7}
      to{transform:translateY(0);opacity:1}
    }
    .anonToggle{
      display:flex;
      gap:8px;
      margin-bottom:12px;
    }
    .anonToggle button{
      flex:1;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#14222a;
      color:var(--muted);
      font-weight:800;
      font-size:12px;
      cursor:pointer;
    }
    .anonToggle button.active{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }
    .nav .tab{
      font-size:11px;

    function formatAmount(amount, currency) {
      const symbol = (currency || 'NGN') === 'USD' ? '$' : '₦';
      return symbol + Number(amount || 0).toLocaleString('en-NG');

      const d = new Date();

    async function postTransferSend(payload) {
      const res = await fetch('/transfers/send', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${await window.Clerk.session.getToken()}`,
        },
        body: JSON.stringify(payload),
      });
      const j = await res.json().catch(() => ({}));
      return { res, j };
    }

    async function handleTransferSuccess(j) {
      sessionStorage.setItem('sendReceipt', JSON.stringify(j.transfer || {}));
      sessionStorage.removeItem('sendFlow');
      await refreshEarningsBar({ celebrate: true });
      navTo('send/5');
    }

    function tierIndex(tier) {
      const i = TIER_ORDER.indexOf(String(tier || 'BRONZE').toUpperCase());
      return i >= 0 ? i : 0;
    }

    function getStoredTier() {
      return localStorage.getItem('payoLastTier') || null;
    }

    function setStoredTier(tier) {
      localStorage.setItem('payoLastTier', tier);

    async function fetchEarningsProgress() {
      const res = await fetch('/earnings/progress', {
        headers: await getAuthHeaders(),
        cache: 'no-store',
      });
      if (res.status === 401) throw new Error('Unauthenticated');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to load earnings');
      return data;
    }

    function buildEarningsHint(progress) {
      if (!progress) return 'Loading tier progress...';
      const next = progress.nextTier;
      const rate = progress.nextEarningsRatePercent;
      if (!next) {
        const currentRate = progress.currentEarningsRatePercent ?? 1;
        return `You've reached the top tier — earn <strong>${currentRate}%</strong> back on every transaction`;
      }
      const needed = formatNgnCompact(progress.amountNeeded);
      return `Process <strong>${needed}</strong> more to reach <strong>${next}</strong> — earn <strong>${rate}%</strong> back`;
    }

    function renderEarningsBarDOM(progress, profile) {
      const card = document.getElementById('earningsCard');
      if (!card) return;

      const tier = (progress?.currentTier || profile?.tier || 'BRONZE').toUpperCase();
      const color = TIER_COLORS[tier] || TIER_COLORS.BRONZE;
      const monthlyEarnings = Number(progress?.monthlyEarnings ?? profile?.monthly_earnings ?? 0);
      const pct = Math.min(100, Math.max(0, Number(progress?.percentageProgress ?? 0)));

      const badge = document.getElementById('tierBadge');
      if (badge) {
        badge.style.background = color;
        badge.style.color = tier === 'PLATINUM' || tier === 'DIAMOND' ? '#111' : '#111';
        badge.innerHTML = `<span class="dot" style="background:${tier === 'PLATINUM' ? '#888' : '#111'}"></span>${tier}`;
      }

      const earnedEl = document.getElementById('earningsCounter');
      if (earnedEl) {
        earnedEl.innerHTML = `<span>${formatNgnCompact(monthlyEarnings)}</span> earned this month`;
      }

      const fill = document.getElementById('earningsProgressFill');
      if (fill) {
        fill.style.width = pct + '%';
        fill.style.background = `linear-gradient(90deg, ${color}, var(--primary))`;
      }

      const hint = document.getElementById('earningsHint');
      if (hint) hint.innerHTML = buildEarningsHint(progress);
    }

    let confettiAnimId = null;

    function stopConfetti() {
      if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
      confettiAnimId = null;
    }

    function runConfetti(color) {
      const overlay = document.getElementById('tierCelebration');
      const canvas = document.getElementById('confettiCanvas');
      if (!overlay || !canvas) return;

      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: 4 + Math.random() * 6,
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 5,
        rot: Math.random() * Math.PI,
        vr: -0.15 + Math.random() * 0.3,
      }));

      const start = performance.now();
      stopConfetti();

      function frame(now) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          if (p.y > canvas.height + 20) {
            p.y = -20;
            p.x = Math.random() * canvas.width;
          }
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.85;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();
        }
        if (now - start < 3000) {
          confettiAnimId = requestAnimationFrame(frame);
        }
      }
      confettiAnimId = requestAnimationFrame(frame);
    }

    function showTierCelebration(tier, ratePercent) {
      const overlay = document.getElementById('tierCelebration');
      const title = document.getElementById('tierCelebrationTitle');
      const sub = document.getElementById('tierCelebrationSub');
      if (!overlay || !title || !sub) return;

      const color = TIER_COLORS[tier] || TIER_COLORS.BRONZE;
      title.textContent = `You just reached ${tier}! 🎉`;
      title.style.color = color;
      sub.textContent = `Your earnings rate is now ${ratePercent}% back on every transaction`;

      overlay.classList.remove('hidden');
      overlay.setAttribute('aria-hidden', 'false');
      runConfetti(color);

      setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.setAttribute('aria-hidden', 'true');
        stopConfetti();
      }, 3000);
    }

    function maybeCelebrateTierUpgrade(progress) {
      if (!progress?.currentTier) return;
      const newTier = progress.currentTier.toUpperCase();
      const stored = getStoredTier();

      if (!stored) {
        setStoredTier(newTier);
        return;
      }

      if (tierIndex(newTier) > tierIndex(stored)) {
        showTierCelebration(newTier, progress.currentEarningsRatePercent ?? 0.2);
      }
      setStoredTier(newTier);
    }

    function openTierShareWhatsApp(progress) {
      const tier = (progress?.currentTier || 'BRONZE').toUpperCase();
      const rate = progress?.currentEarningsRatePercent ?? 0.2;
      const text = `I just reached ${tier} status on Payo! I earn ${rate}% back on every naira I process. Join me: ${PAYO_SHARE_URL}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    async function loadAndRenderEarnings(options = {}) {
      const { celebrate = true } = options;
      try {
        const [profile, progress] = await Promise.all([
          fetchProfile(),
          fetchEarningsProgress(),
        ]);
        earningsData = { profile, progress };
        renderEarningsBarDOM(progress, profile);
        if (celebrate) maybeCelebrateTierUpgrade(progress);
        return earningsData;
      } catch (err) {
        console.warn('[Payo] Earnings load failed:', err.message);
        const hint = document.getElementById('earningsHint');
        if (hint) hint.textContent = 'Could not load earnings. Pull home to retry.';
        return null;
      }
    }

    async function refreshEarningsBar(options = {}) {
      return loadAndRenderEarnings({ celebrate: options.celebrate !== false });
    }

    function parseAmount(value) {
      const cleaned = String(value || '').replace(/[^\d.]/g, '');
      return Number(cleaned);
    }

    function wireFormInputs(root) {
      if (!root) return;
      root.querySelectorAll('input, textarea, select').forEach((el) => {
        el.addEventListener('click', (e) => e.stopPropagation());
        el.addEventListener('keydown', (e) => e.stopPropagation());
        el.addEventListener('input', (e) => e.stopPropagation());
        el.addEventListener('focus', (e) => e.stopPropagation());
      });
    }

    function timeAgo(iso) {
      const d = new Date(iso);
      const ms = Date.now() - d.getTime();
      const min = Math.floor(ms / 60000);
      if (min < 1) return 'now';
      if (min < 60) return `${min}m`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}h`;
      const day = Math.floor(hr / 24);
      return `${day}d`;
    }

    function communityTimeAgo(iso) {
      const d = new Date(iso);
      const ms = Date.now() - d.getTime();
      const min = Math.floor(ms / 60000);
      if (min < 1) return 'Just now';
      if (min < 60) return `${min} minute${min === 1 ? '' : 's'} ago`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr} hour${hr === 1 ? '' : 's'} ago`;
      const day = Math.floor(hr / 24);
      if (day === 1) return 'Yesterday';
      if (day < 7) return `${day} days ago`;
      return d.toLocaleDateString();
    }

    function tierEmoji(tier) {
      return TIER_EMOJI[String(tier || 'BRONZE').toUpperCase()] || TIER_EMOJI.BRONZE;
    }

    function stopCommunityRefresh() {
      if (communityFeedInterval) {
        clearInterval(communityFeedInterval);
        communityFeedInterval = null;
      }
    }

    async function fetchCommunityFeed() {
      const res = await fetch('/community/feed', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Failed to load feed');
      return data.posts || [];
    }

    function buildPaymentWinMessage(amount, currency) {
      const cur = String(currency || 'NGN').toUpperCase();
      const formatted = formatAmount(amount, cur);
      if (cur === 'USD') {
        return `Just received ${formatted} internationally through Payo 🌍`;
      }
      return `Just got paid ${formatted} for client work through Payo 💚`;
    }

    async function getWinDraft() {
      const stored = sessionStorage.getItem('payoWinDraft');
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch {}
      }

      if (!freelancer?.id) return null;

      try {
        const res = await fetch(`/invoices/${encodeURIComponent(freelancer.id)}`, {
          headers: await getAuthHeaders(),
          cache: 'no-store',
        });
        const j = await res.json().catch(() => ({}));
        const invoices = res.ok ? (j.invoices || []) : [];
        const latestPaid = invoices.find((inv) => String(inv.status).toLowerCase() === 'paid');
        if (!latestPaid || !latestPaid.amount) return null;

        const paidAt = new Date(latestPaid.paid_at || latestPaid.updated_at || latestPaid.created_at || 0);
        const hoursSincePaid = (Date.now() - paidAt.getTime()) / (1000 * 60 * 60);
        if (hoursSincePaid > 48) return null;

        return {
          amount: Number(latestPaid.amount),
          currency: latestPaid.currency || 'NGN',
          message: buildPaymentWinMessage(latestPaid.amount, latestPaid.currency || 'NGN'),
        };
      } catch {
        return null;
      }
    }

    function renderCommunityPostCard(post) {
      const name = post.is_anonymous
        ? 'Anonymous Professional'
        : (post.display_name || 'Payo Professional');
      const cityLine = post.city
        ? `<div class="communityCity">${escapeHtml(post.city)}</div>`
        : '';
      const amountLine = post.amount != null && Number(post.amount) > 0
        ? `<div class="communityAmount">${formatAmount(post.amount, post.currency || 'NGN')}</div>`
        : '';

      return `
        <div class="communityCard" data-post-id="${escapeAttr(post.id)}">
          <div class="communityCardTop">
            <div class="tierAvatar">${tierEmoji(post.tier)}</div>
            <div class="communityMeta">
              <div class="communityName">${escapeHtml(name)}</div>
              ${cityLine}
              <div class="communityTime">${communityTimeAgo(post.created_at)}</div>
            </div>
          </div>
          <div class="communityMessage">${escapeHtml(post.message)}</div>
          ${amountLine}
          <div class="communityReactions">
            <button type="button" class="reactionBtn" data-react="green" data-id="${escapeAttr(post.id)}">💚 ${Number(post.green_count || 0)}</button>
            <button type="button" class="reactionBtn" data-react="fire" data-id="${escapeAttr(post.id)}">🔥 ${Number(post.fire_count || 0)}</button>
            <button type="button" class="reactionBtn" data-react="clap" data-id="${escapeAttr(post.id)}">👏 ${Number(post.clap_count || 0)}</button>
          </div>
        </div>
      `;
    }

    function renderCommunityFeedList(posts) {
      const feed = document.getElementById('communityFeed');
      if (!feed) return;

      if (!posts.length) {
        feed.innerHTML = `<div class="communityEmpty">No wins shared yet. Be the first! 🚀</div>`;
        return;
      }

      feed.innerHTML = posts.map(renderCommunityPostCard).join('');
      feed.querySelectorAll('[data-react]').forEach((btn) => {
        btn.onclick = async () => {
          if (!window.Clerk?.session) {
            alert('Sign in to react');
            return;
          }
          try {
            btn.disabled = true;
            const res = await fetch(`/community/react/${encodeURIComponent(btn.dataset.id)}`, {
              method: 'POST',
              headers: await getAuthHeaders(),
              body: JSON.stringify({ reaction: btn.dataset.react }),
            });
            const j = await res.json();
            if (!res.ok || !j.success) throw new Error(j.error || 'Reaction failed');
            const idx = communityPosts.findIndex((p) => p.id === j.post.id);
            if (idx >= 0) communityPosts[idx] = j.post;
            renderCommunityFeedList(communityPosts);
          } catch (err) {
            alert(err.message || t('error'));
          } finally {
            btn.disabled = false;
          }
        };
      });
    }

    async function loadCommunityFeed() {
      const feed = document.getElementById('communityFeed');
      if (!feed) return;
      try {
        communityPosts = await fetchCommunityFeed();
        renderCommunityFeedList(communityPosts);
      } catch (err) {
        feed.innerHTML = `<div class="communityEmpty">${escapeHtml(err.message || t('error'))}</div>`;
      }
    }

    function closeCommunityModal() {
      const modal = document.getElementById('communityModal');
      if (modal) modal.remove();
    }

    async function openCommunityPostModal() {
      closeCommunityModal();
      const draft = await getWinDraft();
      let anonymous = true;

      const modal = document.createElement('div');
      modal.id = 'communityModal';
      modal.className = 'communityModal';
      modal.innerHTML = `
        <div class="communityModalInner">
          <div style="font-weight:900;font-size:17px;margin-bottom:12px">Share your win</div>
          <div class="anonToggle" id="anonToggle">
            <button type="button" data-anon="1" class="active">Share anonymously</button>
            <button type="button" data-anon="0">Share with name</button>
          </div>
          <div id="nameField" class="hidden" style="margin-bottom:10px">
            <input class="input" id="winDisplayName" placeholder="Your display name" value="${escapeAttr(freelancer?.name || '')}">
          </div>
          <input class="input" id="winCity" placeholder="City (optional)" style="margin-bottom:10px">
          <textarea class="input" id="winMessage" rows="3" placeholder="What's your win?" style="margin-bottom:12px">${escapeHtml(draft?.message || '')}</textarea>
          <div class="row">
            <button type="button" class="btn secondary" id="winCancelBtn">${t('cancel')}</button>
            <div class="spacer"></div>
            <button type="button" class="btn" id="winPostBtn">Post</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeCommunityModal();
      });

      modal.querySelectorAll('#anonToggle button').forEach((btn) => {
        btn.onclick = () => {
          anonymous = btn.dataset.anon === '1';
          modal.querySelectorAll('#anonToggle button').forEach((b) => {
            b.classList.toggle('active', b.dataset.anon === (anonymous ? '1' : '0'));
          });
          document.getElementById('nameField').classList.toggle('hidden', anonymous);
        };
      });

      document.getElementById('winCancelBtn').onclick = closeCommunityModal;
      document.getElementById('winPostBtn').onclick = async () => {
        const postBtn = document.getElementById('winPostBtn');
        const message = document.getElementById('winMessage').value.trim();
        if (!message) return alert('Tell us your win first');
        if (!window.Clerk?.session) return alert(t('error'));

        try {
          postBtn.disabled = true;
          const payload = {
            post_type: draft?.amount ? 'payment' : 'win',
            amount: draft?.amount || null,
            currency: draft?.currency || null,
            city: document.getElementById('winCity').value.trim() || null,
            message,
            is_anonymous: anonymous,
            display_name: anonymous ? null : document.getElementById('winDisplayName').value.trim() || freelancer?.name || null,
          };

          const res = await fetch('/community/post', {
            method: 'POST',
            headers: await getAuthHeaders(),
            body: JSON.stringify(payload),
          });
          const j = await res.json();
          if (!res.ok || !j.success) throw new Error(j.error || 'Failed to post');

          sessionStorage.removeItem('payoWinDraft');

    function initials(nameOrEmail) {
      const s = String(nameOrEmail || '').trim();
      if (!s) return 'P';
      const parts = s.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 1).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    async function getAuthHeaders() {
      const token = await window.Clerk.session?.getToken();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      return headers;
    }

    function getFreelancerFromClerk() {
      const user = window.Clerk?.user;
      if (!user) return null;
      const email =
        user.primaryEmailAddress?.emailAddress ||
        user.emailAddresses?.[0]?.emailAddress ||
        '';
      const name =
        [user.firstName, user.lastName].filter(Boolean).join(' ') ||
        user.fullName ||
        user.username ||
        email.split('@')[0] ||
        'Freelancer';
      return { id: user.id, email, name };
    }

    async function fetchProfile() {
      const res = await fetch('/profile', { headers: await getAuthHeaders(), cache: 'no-store' });
      if (res.status === 401) throw new Error('Unauthenticated');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to load profile');
      userProfile = data.profile || null;
      profileFlags = {
        has_wallet: !!data.has_wallet,
        has_bank: !!data.has_bank,
      };
      return userProfile;
    }

    function getClerkUserId() {
      return window.Clerk?.user?.id || null;
    }

    function markProfileSetupDone(userId) {
      if (userId) localStorage.setItem('payoSetupDone_' + userId, 'true');

    function isProfileSetupDone(userId) {
      if (!userId) return false;
      return localStorage.getItem('payoSetupDone_' + userId) === 'true';
    }

      freelancer = getFreelancerFromClerk();

      authScreen.classList.add('hidden');
      appEl.classList.remove('hidden');
      const route = window.location.hash.replace('#', '') || 'home';

    function profileSetupStep(profile) {
      const p = profile || userProfile;
      if (!p?.wallet_address || !String(p.wallet_address).trim()) return 'wallet';
      if (!p?.subaccount_code || !String(p.subaccount_code).trim()) return 'bank';
      return null;
    }

    async function ensureProfileSetup() {
      const userId = getClerkUserId();
      if (!userId) return false;

      if (isProfileSetupDone(userId)) {
        return false;
      }

      try {
        const profile = await fetchProfile();
        const step = profileSetupStep(profile);
        const route = window.location.hash.replace('#', '') || 'home';
        if (step && !route.startsWith('profile-setup')) {
          navTo(`profile-setup/${step}`);
          return true;
        }
      } catch (err) {
        console.warn('[Payo] Profile setup check failed:', err.message);
      }
      return false;
    }

    async function onClerkSignedIn(user) {
      freelancer = getFreelancerFromClerk();

      authScreen.classList.add('hidden');
      appEl.classList.remove('hidden');

      const userId = user.id;
      const setupDone = localStorage.getItem('payoSetupDone_' + userId);
      if (setupDone) {
        showMainApp();
        return;

      const redirected = await ensureProfileSetup();

    async function loadBanksIntoSelect(selectEl, selectedCode) {
      const res = await fetch('/banks', { cache: 'no-store' });
      const j = await res.json();
      if (!res.ok || !j.success) throw new Error(j.error || 'Failed to load banks');
      const banks = j.banks || [];
      selectEl.innerHTML =

    async function fetchRecentActivity() {
      // invoices: last 5
      const invoicesRes = await fetch(`/invoices/${encodeURIComponent(freelancer.id)}`, {
        headers: await getAuthHeaders(),
        cache: 'no-store',
      });
      const invoicesJson = await invoicesRes.json().catch(() => ({}));
      const invoices = invoicesRes.ok ? (invoicesJson.invoices || []) : [];

      // transfers: last 5
      const transfersRes = await fetch('/transfers/history', {
        headers: await getAuthHeaders(),
        cache: 'no-store',
      });
      const transfersJson = await transfersRes.json().catch(() => ({}));
      const transfers = transfersRes.ok ? (transfersJson.transfers || []) : [];

      const recent = [];
      for (const inv of invoices.slice(0, 5)) {
        recent.push({
          kind: 'invoice',
          name: inv.client_name || inv.client_email || inv.client_phone || 'Invoice',
          amount: Number(inv.amount || 0),
          currency: inv.currency || 'NGN',
          status: inv.status || 'pending',
          created_at: inv.created_at || inv.updated_at || new Date().toISOString(),
        });
      }
      for (const tr of transfers.slice(0, 5)) {
        recent.push({
          kind: 'transfer',
          name: tr.recipient_phone_or_email || tr.recipient_id || 'Transfer',
          amount: Number(tr.amount || 0),
          currency: 'NGN',
          status: 'transfer',
          created_at: tr.created_at || new Date().toISOString(),
        });
      }

      recent.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      return recent.slice(0, 5);
    }

    function render(force) {
      if (!force && isUserTyping()) {
        pendingRender = true;
        return;
      }
      pendingRender = false;

      const route = window.location.hash.replace('#', '') || 'home';

      // BUG 3: floating P button must never block the chat screen
      if (aiFab) aiFab.style.display = route === 'chat' ? 'none' : 'flex';

      // BUG 2: never re-render the chat screen while it is alive — that wipes
      // the input and message bubbles. Its DOM persists until you navigate away.
      if (route === 'chat' && currentScreen === 'chat') {
        const liveChatInput = document.getElementById('chatInput');
        if (liveChatInput) {
          if (document.activeElement === liveChatInput) return;
          return;
        }
      }

      currentScreen = route;
      if (route !== 'community') stopCommunityRefresh();
      if (route === 'home') return renderHome();
      if (route.startsWith('send')) return renderSendFlow(route);
      if (route.startsWith('bill')) return renderBillFlow(route);
      if (route.startsWith('collect')) return renderCollectFlow(route || 'collect');
      if (route.startsWith('global')) return renderGlobalFlow(route);
      if (route.startsWith('quick')) return renderQuickLinkFlow(route);
      if (route.startsWith('checkout-orders')) return renderCheckoutOrders(route);
      if (route === 'checkouts') return renderMyCheckouts();
      if (route.startsWith('checkout')) return renderCheckoutFlow(route);
      if (route === 'track') return renderTrack();
      if (route === 'community') return renderCommunity();
      if (route.startsWith('profile-setup')) return renderProfileSetup(route);
      if (route === 'chat') return renderChat();
      if (route === 'settings') return renderSettings();
      return renderHome();
    }

    function safeRender(force) {
      render(force);
    }

    function renderTrack() {
      setActiveTab('track');
      host.innerHTML = `
        <div class="screen">

          <div class="row" style="gap:8px;margin-bottom:10px">
            <button class="pill" data-filter="all" type="button">All</button>
            <button class="pill" data-filter="pending" type="button">Pending</button>
            <button class="pill" data-filter="paid" type="button">Paid</button>
            <button class="pill" data-filter="transfers" type="button">Transfers</button>
          </div>
          <div class="list" id="trackList">
            <div class="item"><div class="meta"><div class="name">${t('loading')}</div><div class="sub muted">...</div></div></div>
          </div>
        </div>
      `;
      let filter = 'all';
      host.querySelectorAll('[data-filter]').forEach((b) => {
        b.onclick = () => { filter = b.dataset.filter; load(); };
      });
      async function load() {
        const list = document.getElementById('trackList');
        list.innerHTML = `<div class="item"><div class="meta"><div class="name">${t('loading')}</div><div class="sub muted">...</div></div></div>`;
        try{
          const invRes = await fetch(`/invoices/${encodeURIComponent(freelancer.id)}`, { headers: await getAuthHeaders(), cache:'no-store' });
          const invJson = await invRes.json().catch(() => ({}));
          const invoices = invRes.ok ? (invJson.invoices || []) : [];
          const trRes = await fetch('/transfers/history', { headers: await getAuthHeaders(), cache:'no-store' });
          const trJson = await trRes.json().catch(() => ({}));
          const transfers = trRes.ok ? (trJson.transfers || []) : [];

          const rows = [];
          if (filter !== 'transfers') {
            for (const inv of invoices) {
              if (filter === 'paid' && inv.status !== 'paid') continue;
              if (filter === 'pending' && inv.status === 'paid') continue;
              rows.push({
                kind:'invoice',
                name: inv.client_name || inv.client_email || inv.client_phone || 'Invoice',
                amount: Number(inv.amount || 0),
                currency: inv.currency || 'NGN',
                status: inv.status || 'pending',
                date: inv.created_at || inv.updated_at || new Date().toISOString()
              });
            }
          }
          if (filter === 'all' || filter === 'transfers') {
            for (const tr of transfers) {
              rows.push({
                kind:'transfer',
                name: tr.recipient_phone_or_email || tr.recipient_id || 'Transfer',
                amount: Number(tr.amount || 0),
                currency: 'NGN',
                status:'transfer',
                date: tr.created_at || new Date().toISOString()
              });
            }
          }
          rows.sort((a,b) => new Date(b.date) - new Date(a.date));
          if (!rows.length) {
            list.innerHTML = `<div class="item"><div class="meta"><div class="name">No records</div><div class="sub muted">Try another filter</div></div></div>`;
            return;
          }
          list.innerHTML = rows.slice(0, 50).map(r => {
            const who = r.name;
            const ini = initials(who);
            const badgeText = r.kind === 'transfer' ? 'TR' : ini;
            let cls = 'warn', label = t('pending');
            if (r.kind === 'transfer') { cls='out'; label='Transfer'; }
            else if (String(r.status).toLowerCase()==='paid') { cls='ok'; label=t('paid'); }
            return `
              <div class="item">
                <div class="badge">${escapeHtml(badgeText)}</div>
                <div class="meta">
                  <div class="name">${escapeHtml(who)}</div>
                  <div class="sub">${escapeHtml(label)} • ${new Date(r.date).toLocaleDateString()}</div>
                </div>
                <div class="amt ${cls}">${(r.kind==='transfer' ? '-' : '')}${formatAmount(r.amount, r.currency || 'NGN')}</div>
              </div>
            `;
          }).join('');
        } catch(err) {
          list.innerHTML = `<div class="item"><div class="meta"><div class="name">${t('error')}</div><div class="sub muted">${escapeHtml(err.message)}</div></div></div>`;
        }
      }
      load();
    }

    function renderChat() {
      // Never rebuild the chat while the user is typing in it
      const existingInput = document.getElementById('chatInput');
      if (existingInput && document.activeElement === existingInput) return;

      setActiveTab('chat');

      // Restore full message history — chatMessages persists across renders
      const historyHtml = (chatMessages || [])
        .filter((m) => m && typeof m.content === 'string' && (m.role === 'user' || m.role === 'assistant'))
        .map((m) => `<div class="bubble ${m.role === 'user' ? 'sent' : 'received'}">${escapeHtml(m.content)}</div>`)
        .join('');

      host.innerHTML = `
        <div class="chatWrap">
          <div class="topbar" style="position:sticky;top:0">
            <button class="iconbtn" type="button" id="backHome">← ${t('back')}</button>
            <div style="font-weight:900">${t('chatTitle')}</div>
            <div class="spacer"></div>
            <button class="iconbtn" type="button" id="signOutBtn">${t('signOut')}</button>
          </div>
          <div class="chatBody" id="chatBody">
            <div class="bubble received" id="chatWelcome">${escapeHtml(t('chatWelcome'))}<div class="time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div></div>
            ${historyHtml}
          </div>
          <div class="chatFoot">
            <textarea class="input" id="chatInput" rows="1" placeholder="${escapeAttr(t('chatPlaceholder'))}" oninput="this.dataset.value = this.value"></textarea>
            <button class="btn" style="padding:12px 14px" id="chatSend">${t('chatSend')}</button>
          </div>
        </div>
      `;
      document.getElementById('backHome').onclick = () => navTo('home');
      document.getElementById('signOutBtn').onclick = async () => { if (window.Clerk) await window.Clerk.signOut(); };

      const chatBody = document.getElementById('chatBody');
      const chatInput = document.getElementById('chatInput');
      const chatSend = document.getElementById('chatSend');

      // Restore the draft the user was typing before any re-render
      if (chatDraft) {
        chatInput.value = chatDraft;
        chatInput.dataset.value = chatDraft;
      }
      chatBody.scrollTop = chatBody.scrollHeight;

      chatInput.addEventListener('click', (e) => e.stopPropagation());
      chatInput.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      });
      chatInput.addEventListener('input', (e) => {
        e.stopPropagation();
        chatDraft = chatInput.value;
        chatInput.dataset.value = chatInput.value;
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
      });
      chatInput.addEventListener('focus', (e) => e.stopPropagation());
      chatSend.onclick = send;

      function addBubble(text, type) {
        const b = document.createElement('div');
        b.className = 'bubble ' + (type === 'sent' ? 'sent' : 'received');
        b.innerHTML = `${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
        chatBody.appendChild(b);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      async function send() {
        const text = chatInput.value.trim();
        if (!text || chatLoading) return;
        freelancer = getFreelancerFromClerk();
        if (!freelancer?.id || !freelancer?.email) {
          addBubble(t('error'), 'received');
          return;
        }
        // Clearing here is allowed: the user just sent the message
        chatInput.value = '';
        chatInput.dataset.value = '';
        chatDraft = '';
        chatInput.style.height = 'auto';
        addBubble(text, 'sent');
        chatLoading = true;
        chatSend.disabled = true;
        try{
          const res = await fetch('/chat', {
            method:'POST',
            headers: await getAuthHeaders(),
            body: JSON.stringify({
              message: text,
              messages,
              freelancer_id: freelancer.id,
              freelancer_email: freelancer.email,
              freelancer_name: freelancer.name,
            })
          });
          const j = await res.json();
          if (!res.ok) throw new Error(j.error || t('error'));
          messages = j.messages || messages;
          chatMessages = messages;
          addBubble(j.reply || 'Done', 'received');
        } catch(err) {
          addBubble(t('error'), 'received');
        } finally {
          chatLoading = false;
          chatSend.disabled = false;
        }
      }
      wireFormInputs(host);
    }

        const stockLimitEl = document.getElementById('coStockLimit');
        const vatPreview = document.getElementById('vatPreview');
        vatEl.onchange = () => {
          if (vatEl.checked && priceNum) {
            vatPreview.textContent = `${formatAmount(priceNum, 'NGN')} + ${formatAmount(vatAmt, 'NGN')} = ${formatAmount(totalAmt, 'NGN')}`;
          } else {
            vatPreview.textContent = 'VAT preview appears when enabled';
          }
        };
        stockEl.onchange = () => {
          stockLimitEl.classList.toggle('hidden', !stockEl.checked);
        };
        document.getElementById('coBack2').onclick = () => navTo('checkout/1');
        document.getElementById('coNext2').onclick = () => {
          state.is_digital = productType === 'digital';
          state.download_url = document.getElementById('coDownloadUrl')?.value.trim() || '';
          state.add_vat = vatEl.checked;
          state.limit_stock = stockEl.checked;
          state.stock_limit = stockEl.checked ? document.getElementById('coStockLimit').value : null;
          if (state.is_digital && !state.download_url) {
            return alert('Add a download URL for digital products');
          }
          sessionStorage.setItem('checkoutFlow', JSON.stringify(state));
          navTo('checkout/3');
        };
        wireFormInputs(host);
        return;
      }

      if (step === '3') {
        host.innerHTML = `
          <div class="screen">
            <div class="sectionTitle">Create Checkout — Step 3</div>
            <div class="card" style="padding:14px">
              <div class="toggleRow">
                <div><div class="toggleLabel">Collect customer name</div></div>
                <label class="toggle"><input type="checkbox" id="coCollectName" ${state.collect_name !== false ? 'checked' : ''}><span class="toggleSlider"></span></label>
              </div>
              <div class="toggleRow">
                <div><div class="toggleLabel">Collect customer email</div></div>
                <label class="toggle"><input type="checkbox" id="coCollectEmail" ${state.collect_email !== false ? 'checked' : ''}><span class="toggleSlider"></span></label>
              </div>
              <div class="toggleRow">
                <div><div class="toggleLabel">Collect customer phone</div></div>
                <label class="toggle"><input type="checkbox" id="coCollectPhone" ${state.collect_phone !== false ? 'checked' : ''}><span class="toggleSlider"></span></label>
              </div>
              <div class="muted" style="font-size:12px;margin:14px 0 8px">Custom thank you message (optional)</div>
              <input class="input" id="coThankYou" placeholder="Thanks for your purchase!" value="${escapeAttr(state.thank_you_message || '')}">
              <div class="row" style="margin-top:14px">
                <button class="btn secondary" type="button" id="coBack3">${t('back')}</button>
                <div class="spacer"></div>
                <button class="btn" type="button" id="coCreate">Create Checkout</button>
              </div>
            </div>
          </div>
        `;
        document.getElementById('coBack3').onclick = () => navTo('checkout/2');
        document.getElementById('coCreate').onclick = async () => {
          const btn = document.getElementById('coCreate');
          btn.disabled = true;
          try {
            const payload = {
              product_name: state.product_name,
              description: state.description || '',
              price: parseAmount(state.price),
              currency: state.currency || 'NGN',
              is_digital: !!state.is_digital,
              download_url: state.download_url || null,
              add_vat: !!state.add_vat,
              stock_limit: state.limit_stock ? Number(state.stock_limit) : null,
              collect_name: document.getElementById('coCollectName').checked,
              collect_email: document.getElementById('coCollectEmail').checked,
              collect_phone: document.getElementById('coCollectPhone').checked,
              thank_you_message: document.getElementById('coThankYou').value.trim() || null,
            };
            const res = await fetch('/checkout/create', {
              method: 'POST',
              headers: await getAuthHeaders(),
              body: JSON.stringify(payload),
            });
            const j = await res.json();
            if (!res.ok || !j.success) {
              const handled = handleInvoiceSetupError(j, {
                backRoute: 'checkout/3',
                usdLabel: 'Create USD Checkout instead',
                onSwitchUsd: () => {
                  const next = {
                    ...state,
                    currency: 'USD',
                    collect_name: payload.collect_name,
                    collect_email: payload.collect_email,
                    collect_phone: payload.collect_phone,
                    thank_you_message: payload.thank_you_message || '',
                  };
                  sessionStorage.setItem('checkoutFlow', JSON.stringify(next));
                  navTo('checkout/1');
                  safeRender(true);
                },
              });
              if (handled) return;
              throw new Error(j.message || j.error || 'Failed to create checkout');
            }
            sessionStorage.setItem('checkoutReceipt', JSON.stringify({
              url: j.checkout?.url || '',
              slug: j.checkout?.slug,
            }));
            sessionStorage.removeItem('checkoutFlow');
            navTo('checkout/success');
          } catch (err) {
            alert(err.message || t('error'));
          } finally {
            btn.disabled = false;
          }
        };
        wireFormInputs(host);
        return;
      }

      navTo('checkout/1');
    }

    function renderMyCheckouts() {
      setActiveTab('home');
      host.innerHTML = `
        <div class="screen">
          <div class="sectionTitle">My Checkouts</div>
          <div class="list" id="checkoutsList">
            <div class="item"><div class="meta"><div class="name">${t('loading')}</div></div></div>
          </div>
          <button class="btn" type="button" id="newCheckoutBtn" style="width:100%;margin-top:12px">+ Create Checkout</button>
        </div>
      `;
      document.getElementById('newCheckoutBtn').onclick = () => navTo('checkout/1');

      (async () => {
        const list = document.getElementById('checkoutsList');
        try {
          const res = await fetch('/checkout/my', { headers: await getAuthHeaders(), cache: 'no-store' });
          const j = await res.json();
          if (!res.ok || !j.success) throw new Error(j.error || 'Failed to load');
          const items = j.checkouts || [];
          if (!items.length) {
            list.innerHTML = `<div class="item"><div class="meta"><div class="name">No checkouts yet</div><div class="sub muted">Create your first product checkout</div></div></div>`;
            return;
          }
          list.innerHTML = items.map((c) => {
            const typeBadge = c.is_digital
              ? '<span class="checkoutBadge digital">Digital</span>'
              : '<span class="checkoutBadge physical">Physical</span>';
            const salesBadge = `<span class="checkoutBadge sales">${Number(c.total_sales || 0)} sales</span>`;
            return `
              <div class="item checkoutItem" data-id="${escapeAttr(c.id)}" style="cursor:pointer">
                <div class="meta" style="flex:1">
                  <div class="name">${escapeHtml(c.product_name)} ${typeBadge} ${salesBadge}</div>
                  <div class="sub muted">${formatAmount(c.total_revenue || 0, c.currency || 'NGN')} revenue</div>
                </div>
                <label class="toggle" onclick="event.stopPropagation()">
                  <input type="checkbox" class="coActiveToggle" data-id="${escapeAttr(c.id)}" ${c.is_active ? 'checked' : ''}>
                  <span class="toggleSlider"></span>
                </label>
              </div>
            `;
          }).join('');

          list.querySelectorAll('.checkoutItem').forEach((el) => {
            el.onclick = () => navTo(`checkout-orders/${el.dataset.id}`);
          });
          list.querySelectorAll('.coActiveToggle').forEach((toggle) => {
            toggle.onchange = async () => {
              try {
                const res = await fetch(`/checkout/${encodeURIComponent(toggle.dataset.id)}/status`, {
                  method: 'PATCH',
                  headers: await getAuthHeaders(),
                  body: JSON.stringify({ is_active: toggle.checked }),
                });
                const j = await res.json();
                if (!res.ok || !j.success) throw new Error(j.error || 'Update failed');
              } catch (err) {
                toggle.checked = !toggle.checked;
                alert(err.message || t('error'));
              }
            };
          });
        } catch (err) {
          list.innerHTML = `<div class="item"><div class="meta"><div class="name">${t('error')}</div><div class="sub muted">${escapeHtml(err.message)}</div></div></div>`;
        }
      })();
    }

    function renderCheckoutOrders(route) {
      setActiveTab('home');
      const checkoutId = (route || 'checkout-orders').split('/')[1] || '';
      host.innerHTML = `
        <div class="screen">
          <div class="row" style="margin-bottom:10px">
            <button class="btn secondary" type="button" id="ordersBackBtn">${t('back')}</button>
            <div class="spacer"></div>
          </div>
          <div class="sectionTitle" id="ordersTitle">Orders</div>
          <div class="list" id="ordersList">
            <div class="item"><div class="meta"><div class="name">${t('loading')}</div></div></div>
          </div>
        </div>
      `;
      document.getElementById('ordersBackBtn').onclick = () => navTo('checkouts');

      (async () => {
        const list = document.getElementById('ordersList');
        try {
          const res = await fetch(`/checkout/orders/${encodeURIComponent(checkoutId)}`, {
            headers: await getAuthHeaders(),
            cache: 'no-store',
          });
          const j = await res.json();
          if (!res.ok || !j.success) throw new Error(j.error || 'Failed to load orders');
          document.getElementById('ordersTitle').textContent = j.checkout?.product_name || 'Orders';
          const orders = j.orders || [];
          if (!orders.length) {
            list.innerHTML = `<div class="item"><div class="meta"><div class="name">No orders yet</div><div class="sub muted">Share your checkout link to get sales</div></div></div>`;
            return;
          }
          list.innerHTML = orders.map((o) => {
            const status = String(o.status || 'pending').toLowerCase();
            const statusCls = status === 'paid' ? 'ok' : 'warn';
            const date = o.created_at ? new Date(o.created_at).toLocaleDateString() : '';
            let downloadLine = '';
            if (j.checkout?.is_digital && status === 'paid') {
              const count = Number(o.download_count || 0);
              downloadLine = `<div class="sub muted">Downloaded ${count}/3 times</div>`;
            }
            return `
              <div class="item">
                <div class="meta" style="flex:1">
                  <div class="name">${escapeHtml(o.customer_name || o.customer_email || 'Customer')}</div>
                  <div class="sub">${escapeHtml(status)} • ${date}</div>
                  ${downloadLine}
                </div>
                <div style="text-align:right">
                  <div class="amt ${statusCls}">${formatAmount(o.amount, o.currency || 'NGN')}</div>
                  <button class="btn secondary" type="button" disabled style="margin-top:6px;padding:6px 10px;font-size:11px;opacity:.5">Refund</button>
                </div>
              </div>
            `;
          }).join('');
        } catch (err) {
          list.innerHTML = `<div class="item"><div class="meta"><div class="name">${t('error')}</div><div class="sub muted">${escapeHtml(err.message)}</div></div></div>`;
        }
      })();
    }

    function renderSettings() {
      setActiveTab('settings');
      host.innerHTML = `
        <div class="screen">
          <div class="sectionTitle">${t('Settings') || 'Settings'}</div>
          <div class="card" style="padding:14px;margin-bottom:10px">
            <div class="row">
              <div class="col" style="gap:2px">
                <div style="font-weight:900">My Checkouts</div>
                <div class="muted" style="font-size:12px">Manage product pages & orders</div>
              </div>
              <div class="spacer"></div>
              <button class="btn secondary" type="button" id="myCheckoutsBtn">View</button>
            </div>
          </div>
          <div class="card" style="padding:14px;margin-bottom:10px">
            <div class="row">
              <div class="col" style="gap:2px">
                <div style="font-weight:900">Payout bank</div>
                <div class="muted" style="font-size:12px">${profileFlags.has_bank ? 'Linked for Naira payments' : 'Not linked yet'}</div>
              </div>
              <div class="spacer"></div>
              <button class="btn secondary" type="button" id="bankSetupBtn">${profileFlags.has_bank ? 'Update' : 'Set up'}</button>
            </div>
          </div>
          <div class="card" style="padding:14px">
            <div class="row">
              <div class="col" style="gap:2px">
                <div style="font-weight:900">Language</div>
                <div class="muted" style="font-size:12px">EN ←→ PID</div>
              </div>
              <div class="spacer"></div>
              <button class="btn secondary" type="button" id="toggleBtn">${getLang().toUpperCase()}</button>
            </div>
            <div style="height:12px"></div>
            <button class="btn secondary" type="button" id="logoutBtn">Log out</button>
          </div>
        </div>
      `;
      document.getElementById('myCheckoutsBtn').onclick = () => navTo('checkouts');
      document.getElementById('bankSetupBtn').onclick = () => navTo('profile-setup/bank');
      document.getElementById('toggleBtn').onclick = () => langToggle.click();
      document.getElementById('logoutBtn').onclick = async () => { if (window.Clerk) await window.Clerk.signOut(); };

      (async () => {
        try {
          await fetchProfile();
          const statusEl = host.querySelector('.card .muted');
          if (statusEl && profileFlags.has_bank) {
            statusEl.textContent = 'Linked for Naira payments';
          }
        } catch {}
      })();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text ?? '');
      return div.innerHTML.replace(/\n/g, '<br>');
    }
    function escapeAttr(text) {
      return String(text ?? '').replace(/"/g, '&quot;');
    }

    function mountClerkAuth() {
      if (!window.Clerk || clerkSignInMounted) return;
      clerkAuthEl.innerHTML = `
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">
          <button type="button" id="showSignIn" style="flex:1;padding:10px;border-radius:14px;border:none;background:#00a884;color:#fff;cursor:pointer;font-size:14px;font-weight:800;">Sign in</button>
          <button type="button" id="showSignUp" style="flex:1;padding:10px;border-radius:14px;border:1px solid #2a3942;background:#1f2c34;color:#e9edef;cursor:pointer;font-size:14px;font-weight:800;">Sign up</button>
        </div>
        <div id="clerk-sign-in"></div>
        <div id="clerk-sign-up" style="display:none;"></div>
      `;

      const signInHost = document.getElementById('clerk-sign-in');
      const signUpHost = document.getElementById('clerk-sign-up');
      const clerkAppearance = {
        variables: {
          colorBackground: '#1f2c34',
          colorInputBackground: '#2a3942',
          colorInputText: '#e9edef',
          colorPrimary: '#00a884',
          colorText: '#e9edef',
          colorTextSecondary: '#8696a0',
        },
      };

      if (clerkSignInMounted) window.Clerk.unmountSignIn(signInHost);
      if (clerkSignUpMounted) window.Clerk.unmountSignUp(signUpHost);

      window.Clerk.mountSignIn(signInHost, { appearance: clerkAppearance });
      window.Clerk.mountSignUp(signUpHost, { appearance: clerkAppearance });
      clerkSignInMounted = true;
      clerkSignUpMounted = true;

      document.getElementById('showSignIn').addEventListener('click', () => {
        signInHost.style.display = 'block';
        signUpHost.style.display = 'none';
        document.getElementById('showSignIn').style.background = '#00a884';
        document.getElementById('showSignIn').style.color = '#fff';
        document.getElementById('showSignUp').style.background = '#1f2c34';
        document.getElementById('showSignUp').style.color = '#e9edef';
      });

      document.getElementById('showSignUp').addEventListener('click', () => {
        signInHost.style.display = 'none';
        signUpHost.style.display = 'block';
        document.getElementById('showSignUp').style.background = '#00a884';
        document.getElementById('showSignUp').style.color = '#fff';
        document.getElementById('showSignIn').style.background = '#1f2c34';
        document.getElementById('showSignIn').style.color = '#e9edef';
      });
    }

    async function loadClerkScript(publishableKey) {
      return new Promise((resolve, reject) => {
        if (window.Clerk) return resolve();
        const script = document.createElement('script');
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.setAttribute('data-clerk-publishable-key', publishableKey);
        script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load Clerk'));
        document.head.appendChild(script);
      });
    }

    async function init() {
      langToggle.textContent = getLang().toUpperCase();
      try {
        const configRes = await fetch('/config');
        const { clerkPublishableKey } = await configRes.json();
        if (!clerkPublishableKey) {
          authLoading.textContent = 'Clerk is not configured. Add CLERK_PUBLISHABLE_KEY to .env';
          return;
        }
        await loadClerkScript(clerkPublishableKey);
        await window.Clerk.load();
        authLoading.style.display = 'none';

        window.Clerk.addListener(async ({ user }) => {
          if (!user) {
            lastSignedInUserId = null;
            authScreen.classList.remove('hidden');
            appEl.classList.add('hidden');
            mountClerkAuth();
            return;
          }
          // Clerk fires this on every session/token refresh — only treat it as
          // a sign-in once per user, otherwise the app resets to home mid-use.
          if (lastSignedInUserId === user.id) return;
          lastSignedInUserId = user.id;
          await onClerkSignedIn(user);
        });

        if (window.Clerk.user) {
          lastSignedInUserId = window.Clerk.user.id;
          await onClerkSignedIn(window.Clerk.user);
        } else {
          mountClerkAuth();
        }
      } catch (err) {
        authLoading.textContent = `Failed to initialize: ${err.message}`;
      }
    }

    init();
  </script>
