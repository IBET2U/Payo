<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Payo</title>
  <style>
    :root{
      --bg:#0b141a;
      --primary:#00a884;
      --card:#1f2c34;
      --text:#e9edef;
      --muted:#8696a0;
      --border:#2a3942;
      --danger:#ef4444;
      --warn:#f59e0b;
      --ok:#22c55e;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100dvh;
      display:flex;
      justify-content:center;
    }
    .shell{
      width:100%;
      max-width:480px;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      position:relative;
    }
    .hidden{display:none !important}

    /* Shared */
    .topbar{
      flex-shrink:0;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid var(--border);
      background:rgba(31,44,52,.92);
      backdrop-filter: blur(8px);
      position:sticky;
      top:0;
      z-index:10;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      letter-spacing:.2px;
    }
    .pbadge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,#0fd6aa, #00a884);
      display:flex;align-items:center;justify-content:center;
      color:#06221a;font-weight:900;
    }
    .spacer{flex:1}
    .iconbtn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      border-radius:12px;
      padding:8px 10px;
      font-size:13px;
      cursor:pointer;
      transition: all .18s ease;
    }
    .iconbtn:hover{border-color:#3b4a53}
    .avatar{
      width:34px;height:34px;border-radius:50%;
      background:linear-gradient(135deg,#00a884,#007c62);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;color:#042018;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
    }
    .btn{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:12px 14px;
      border-radius:14px;
      font-weight:700;
      cursor:pointer;
      transition: transform .08s ease, filter .18s ease;
    }
    .btn:active{transform:scale(.98)}
    .btn.secondary{
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
    }
    .btn.ghost{
      background:transparent;
      color:var(--muted);
      border:none;
      padding:10px 8px;
      font-weight:600;
    }
    .input{
      width:100%;
      border:1px solid var(--border);
      background:#121f27;
      color:var(--text);
      border-radius:14px;
      padding:14px 14px;
      font-size:16px;
      outline:none;
    }
    .input:focus{border-color:#2d907a}
    .muted{color:var(--muted)}
    .row{display:flex;gap:10px;align-items:center}
    .col{display:flex;flex-direction:column;gap:10px}
    .screen{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:14px 16px 92px;
      animation: slideIn .22s ease;
    }
    @keyframes slideIn{
      from{transform:translateX(10px);opacity:.7}
      to{transform:translateX(0);opacity:1}
    }
    .nav{
      position:sticky;
      bottom:0;
      background:rgba(31,44,52,.92);
      border-top:1px solid var(--border);
      padding:10px 10px 14px;
      display:flex;
      gap:8px;
      justify-content:space-around;
      backdrop-filter: blur(8px);
      z-index:9;
    }
    .nav .tab{
      flex:1;
      text-align:center;
      padding:10px 8px;
      border-radius:14px;
      color:var(--muted);
      border:1px solid transparent;
      cursor:pointer;
      font-size:12px;
      transition: all .18s ease;
    }
    .nav .tab.active{
      color:var(--text);
      border-color:var(--border);
      background:#14222a;
    }
    .nav .tab span{display:block;font-size:18px;margin-bottom:4px}

    /* Auth */
    #auth-screen{padding:22px 16px 40px}
    .authBrand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:18px;margin-bottom:18px}
    .authBrand h1{font-size:22px}
    .authBrand p{font-size:13px;color:var(--muted);text-align:center;max-width:320px;line-height:1.35}
    #clerk-auth{width:100%;max-width:420px;margin:0 auto}
    #auth-loading{color:var(--muted);text-align:center;margin-top:16px}

    /* Home */
    .balanceCard{
      padding:16px;
      background:linear-gradient(135deg,#0e3d33,#0a2c24 55%, #081f1a);
      border:1px solid rgba(0,168,132,.35);
    }
    .balanceTop{display:flex;align-items:flex-start;gap:10px}
    .balanceTop .greet{font-weight:800;font-size:16px}
    .balanceLabel{font-size:12px;color:#ccefe7;margin-top:2px}
    .balanceAmt{font-size:34px;font-weight:900;letter-spacing:-.5px;margin-top:8px}
    .balanceActions{display:flex;gap:10px;margin-top:12px}
    .miniBtn{
      flex:1;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.12);
      color:var(--text);
      font-weight:700;
      cursor:pointer;
      transition: all .18s ease;
    }
    .miniBtn:hover{filter:brightness(1.05)}

    .grid{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .action{
      padding:14px 12px;
      border-radius:16px;
      background:#14222a;
      border:1px solid var(--border);
      cursor:pointer;
      transition: transform .08s ease, border-color .18s ease;
      min-height:78px;
    }
    .action:active{transform:scale(.99)}
    .action .emoji{font-size:22px}
    .action .title{margin-top:8px;font-weight:800}
    .action .sub{margin-top:2px;font-size:12px;color:var(--muted)}

    .sectionTitle{margin-top:18px;margin-bottom:10px;font-size:14px;font-weight:900;letter-spacing:.2px}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{
      padding:12px;
      display:flex;align-items:center;gap:10px;
      border-radius:16px;
      border:1px solid var(--border);
      background:#121f27;
    }
    .item .badge{
      width:40px;height:40px;border-radius:50%;
      background:#0f2a22;
      border:1px solid rgba(0,168,132,.35);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;color:#7ff0d6;
      flex-shrink:0;
    }
    .item .meta{flex:1;min-width:0}
    .item .meta .name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item .meta .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .item .amt{font-weight:900}
    .amt.ok{color:var(--ok)}
    .amt.warn{color:var(--warn)}
    .amt.out{color:var(--danger)}

    /* Floating AI */
    .aiFab{
      position:fixed;
      right:18px;
      bottom:86px;
      width:58px;height:58px;
      border-radius:999px;
      background:radial-gradient(circle at 30% 30%,#18f1c1, #00a884 55%, #007c62);
      border:1px solid rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(0,0,0,.35);
      animation:pulse 1.7s ease-in-out infinite;
      z-index:20;
    }
    .aiFab span{
      font-weight:1000;
      font-size:20px;
      color:#06221a;
      letter-spacing:.3px;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1); box-shadow:0 14px 30px rgba(0,0,0,.35)}
      50%{transform:scale(1.03); box-shadow:0 18px 40px rgba(0,168,132,.18)}
    }

    /* Chat */
    .chatWrap{
      height:calc(100dvh - 54px);
      display:flex;flex-direction:column;
    }
    .chatBody{
      flex:1;
      overflow:auto;
      padding:14px 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      background:var(--bg) url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23111b21' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .bubble{
      max-width:85%;
      padding:10px 12px;
      border-radius:14px;
      font-size:14.5px;
      line-height:1.42;
      word-wrap:break-word;
    }
    .received{align-self:flex-start;background:#005c4b;border-top-left-radius:6px}
    .sent{align-self:flex-end;background:#fff;color:#111b21;border-top-right-radius:6px}
    .bubble .time{font-size:11px;color:rgba(255,255,255,.7);text-align:right;margin-top:6px}
    .sent .time{color:#667781}
    .chatFoot{
      padding:10px;
      background:rgba(31,44,52,.92);
      border-top:1px solid var(--border);
      display:flex;
      gap:10px;
      align-items:flex-end;
    }
    textarea{
      resize:none;
      max-height:140px;
      min-height:44px;
    }

    /* Success */
    .center{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
      padding:28px 16px;
    }
    .check{
      width:92px;height:92px;border-radius:50%;
      background:rgba(34,197,94,.15);
      border:1px solid rgba(34,197,94,.35);
      display:flex;align-items:center;justify-content:center;
      margin-bottom:14px;
      animation:pop .25s ease;
    }
    @keyframes pop{from{transform:scale(.9);opacity:.6}to{transform:scale(1);opacity:1}}
    .check svg{width:50px;height:50px;fill:var(--ok)}
    .pillRow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
    .pill{
      padding:10px 12px;border-radius:999px;border:1px solid var(--border);
      background:#14222a;color:var(--text);font-weight:700;cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- SCREEN 1: AUTH -->
    <div id="auth-screen">
      <div class="authBrand">
        <div class="pbadge">P</div>
        <h1>Payo</h1>
        <p>Sign in to use your AI payment agent. Built for Nigeria.</p>
      </div>
      <p id="auth-loading">Loading...</p>
      <div id="clerk-auth"></div>
    </div>

    <!-- SCREEN 2+: APP -->
    <div id="app" class="hidden">
      <div class="topbar">
        <div class="logo">
          <div class="pbadge">P</div>
          <div>Payo</div>
        </div>
        <div class="spacer"></div>
        <button id="langToggle" class="iconbtn" type="button">PID</button>
        <button id="settingsBtn" class="iconbtn" type="button">⚙️</button>
        <div class="avatar" id="avatar">P</div>
      </div>

      <div id="screenHost"></div>

      <div class="nav">
        <div class="tab active" data-tab="home"><span>🏠</span>Home</div>
        <div class="tab" data-tab="track"><span>🧾</span>Track</div>
        <div class="tab" data-tab="chat"><span>🤖</span>AI</div>
        <div class="tab" data-tab="settings"><span>⚙️</span>Settings</div>
      </div>

      <button class="aiFab" id="aiFab" type="button" aria-label="Open AI chat"><span>P</span></button>
    </div>
  </div>

  <script>
    const TRANSLATIONS = {
      en: {
        greeting: \"Good morning\",
        sendMoney: \"Send Money\",
        sendBill: \"Send Bill\",
        collectMoney: \"Request Money\",
        globalPayment: \"Get Paid Globally\",
        balance: \"Your Payo Balance\",
        pending: \"Pending\",
        paid: \"Paid\",
        billSent: \"Bill sent! I'll follow up automatically 💚\",
        moneySent: \"Money sent successfully! 🎉\",
        whoOwes: \"Who owes you money?\",
        howMuch: \"How much?\",
        whatDidYouDo: \"What did you do for them?\",
        sendTo: \"Phone number or email\",
        confirm: \"Confirm\",
        cancel: \"Cancel\",
        back: \"Back\",
        loading: \"Loading...\",
        error: \"Something went wrong\"
      },
      pid: {
        greeting: \"How far\",
        sendMoney: \"Send Owo\",
        sendBill: \"Send Bill\",
        collectMoney: \"Collect Money\",
        globalPayment: \"International Payment\",
        balance: \"Your Payo Money\",
        pending: \"Still dey wait\",
        paid: \"E don pay\",
        billSent: \"Bill don go! I go dey chase dem if dem no pay 💚\",
        moneySent: \"Omo! Money don go! 🎉\",
        whoOwes: \"Who owe you money?\",
        howMuch: \"How much dem owe you?\",
        whatDidYouDo: \"Wetin you do for dem?\",
        sendTo: \"Phone number or email\",
        confirm: \"E correct\",
        cancel: \"Comot\",
        back: \"Go back\",
        loading: \"E dey go...\",
        error: \"Something do, try again\"
      }
    };

    function t(key) {
      const lang = localStorage.getItem('payoLang') || 'pid';
      return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || TRANSLATIONS.en[key] || key;
    }

    const authScreen = document.getElementById('auth-screen');
    const authLoading = document.getElementById('auth-loading');
    const clerkAuthEl = document.getElementById('clerk-auth');
    const appEl = document.getElementById('app');
    const host = document.getElementById('screenHost');
    const avatarEl = document.getElementById('avatar');
    const langToggle = document.getElementById('langToggle');
    const aiFab = document.getElementById('aiFab');
    const settingsBtn = document.getElementById('settingsBtn');

    let clerkSignInMounted = false;
    let clerkSignUpMounted = false;
    let freelancer = null;
    let userProfile = null;
    let messages = [];
    let chatLoading = false;

    function getLang() { return localStorage.getItem('payoLang') || 'pid'; }
    function setLang(lang) { localStorage.setItem('payoLang', lang); }

    function formatMoneyNGN(n) {
      const num = Number(n || 0);
      if (!Number.isFinite(num)) return '₦0';
      return '₦' + num.toLocaleString('en-NG', { maximumFractionDigits: 2 });
    }

    function timeAgo(iso) {
      const d = new Date(iso);
      const ms = Date.now() - d.getTime();
      const min = Math.floor(ms / 60000);
      if (min < 1) return 'now';
      if (min < 60) return `${min}m`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}h`;
      const day = Math.floor(hr / 24);
      return `${day}d`;
    }

    function initials(nameOrEmail) {
      const s = String(nameOrEmail || '').trim();
      if (!s) return 'P';
      const parts = s.split(/\\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 1).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    async function getAuthHeaders() {
      const token = await window.Clerk.session?.getToken();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      return headers;
    }

    function getFreelancerFromClerk() {
      const user = window.Clerk?.user;
      if (!user) return null;
      const email =
        user.primaryEmailAddress?.emailAddress ||
        user.emailAddresses?.[0]?.emailAddress ||
        '';
      const name =
        [user.firstName, user.lastName].filter(Boolean).join(' ') ||
        user.fullName ||
        user.username ||
        email.split('@')[0] ||
        'Freelancer';
      return { id: user.id, email, name };
    }

    async function fetchProfile() {
      const res = await fetch('/profile', { headers: await getAuthHeaders(), cache: 'no-store' });
      if (res.status === 401) throw new Error('Unauthenticated');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to load profile');
      userProfile = data.profile;
      return data.profile;
    }

    async function fetchRecentActivity() {
      // invoices: last 5
      const invoicesRes = await fetch(`/invoices/${encodeURIComponent(freelancer.id)}`, {
        headers: await getAuthHeaders(),
        cache: 'no-store',
      });
      const invoicesJson = await invoicesRes.json().catch(() => ({}));
      const invoices = invoicesRes.ok ? (invoicesJson.invoices || []) : [];

      // transfers: last 5
      const transfersRes = await fetch(`/transfers/history?senderId=${encodeURIComponent(freelancer.id)}`, {
        headers: await getAuthHeaders(),
        cache: 'no-store',
      });
      const transfersJson = await transfersRes.json().catch(() => ({}));
      const transfers = transfersRes.ok ? (transfersJson.transfers || []) : [];

      const recent = [];
      for (const inv of invoices.slice(0, 5)) {
        recent.push({
          kind: 'invoice',
          name: inv.client_name || inv.client_email || inv.client_phone || 'Invoice',
          amount: Number(inv.amount || 0),
          status: inv.status || 'pending',
          created_at: inv.created_at || inv.updated_at || new Date().toISOString(),
        });
      }
      for (const tr of transfers.slice(0, 5)) {
        recent.push({
          kind: 'transfer',
          name: tr.recipient_phone_or_email || tr.recipient_id || 'Transfer',
          amount: Number(tr.amount || 0),
          status: 'transfer',
          created_at: tr.created_at || new Date().toISOString(),
        });
      }

      recent.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      return recent.slice(0, 5);
    }

    function setActiveTab(tab) {
      document.querySelectorAll('.nav .tab').forEach((el) => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
    }

    function render() {
      const route = window.location.hash.replace('#', '') || 'home';
      if (route === 'home') return renderHome();
      if (route.startsWith('send')) return renderSendFlow(route);
      if (route.startsWith('bill')) return renderBillFlow(route);
      if (route.startsWith('collect')) return renderCollectFlow(route);
      if (route.startsWith('global')) return renderGlobalFlow(route);
      if (route === 'track') return renderTrack();
      if (route === 'chat') return renderChat();
      if (route === 'settings') return renderSettings();
      return renderHome();
    }

    function navTo(route) {
      window.location.hash = route;
    }

    langToggle.addEventListener('click', () => {
      const next = getLang() === 'pid' ? 'en' : 'pid';
      setLang(next);
      langToggle.textContent = next.toUpperCase();
      render();
    });

    aiFab.addEventListener('click', () => navTo('chat'));
    settingsBtn.addEventListener('click', () => navTo('settings'));

    document.querySelectorAll('.nav .tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        navTo(tab.dataset.tab);
      });
    });

    window.addEventListener('hashchange', render);

    function renderHome() {
      setActiveTab('home');
      host.innerHTML = `
        <div class="screen" id="homeScreen">
          <div class="card balanceCard">
            <div class="balanceTop">
              <div class="col" style="gap:2px;flex:1">
                <div class="greet" id="greet"></div>
                <div class="balanceLabel">${t('balance')}</div>
              </div>
              <div style="text-align:right">
                <div class="muted" style="font-size:12px">NGN</div>
              </div>
            </div>
            <div class="balanceAmt" id="balAmt">₦0</div>
            <div class="balanceActions">
              <button type="button" class="miniBtn" id="topUpBtn">Top Up</button>
              <button type="button" class="miniBtn" id="withdrawBtn">Withdraw</button>
            </div>
          </div>

          <div class="grid">
            <div class="action" id="actSend">
              <div class="emoji">💸</div>
              <div class="title">${t('sendMoney')}</div>
              <div class="sub">${getLang()==='pid'?'Send quick to phone/email':'Send to phone/email'}</div>
            </div>
            <div class="action" id="actBill">
              <div class="emoji">📩</div>
              <div class="title">${t('sendBill')}</div>
              <div class="sub">${getLang()==='pid'?'Create invoice':'Send invoice'}</div>
            </div>
            <div class="action" id="actCollect">
              <div class="emoji">🤝</div>
              <div class="title">${t('collectMoney')}</div>
              <div class="sub">${getLang()==='pid'?'Send request':'Request payment'}</div>
            </div>
            <div class="action" id="actGlobal">
              <div class="emoji">🌍</div>
              <div class="title">${t('globalPayment')}</div>
              <div class="sub">${getLang()==='pid'?'For outside Nigeria':'Get paid in USD'}</div>
            </div>
          </div>

          <div class="sectionTitle">Recent</div>
          <div class="list" id="recentList">
            <div class="item"><div class="meta"><div class="name">${t('loading')}</div><div class="sub muted">...</div></div></div>
          </div>
        </div>
      `;

      document.getElementById('actSend').onclick = () => navTo('send/1');
      document.getElementById('actBill').onclick = () => navTo('bill/1');
      document.getElementById('actCollect').onclick = () => navTo('collect');
      document.getElementById('actGlobal').onclick = () => navTo('global');
      document.getElementById('topUpBtn').onclick = () => alert('Top up coming soon');
      document.getElementById('withdrawBtn').onclick = () => alert('Withdraw coming soon');

      const greet = document.getElementById('greet');
      greet.textContent = `${t('greeting')} ${freelancer.name} 💚`;

      (async () => {
        try {
          const profile = await fetchProfile();
          document.getElementById('balAmt').textContent = formatMoneyNGN(profile.wallet_balance || 0);
          const recent = await fetchRecentActivity();
          const list = document.getElementById('recentList');
          if (!recent.length) {
            list.innerHTML = `<div class="item"><div class="meta"><div class="name">No activity yet</div><div class="sub muted">Create an invoice or send money</div></div></div>`;
            return;
          }
          list.innerHTML = recent.map((r) => {
            const who = r.name;
            const ini = initials(who);
            let amtClass = 'warn';
            let label = r.status;
            let amountPrefix = '';
            if (r.kind === 'transfer') {
              amtClass = 'out';
              label = 'Transfer out';
              amountPrefix = '-';
            } else if (String(r.status).toLowerCase() === 'paid') {
              amtClass = 'ok';
              label = t('paid');
            } else {
              amtClass = 'warn';
              label = t('pending');
            }
            return `
              <div class="item">
                <div class="badge">${ini}</div>

    function renderTrack() {
      setActiveTab('track');
      host.innerHTML = `
        <div class="screen">
          <div class="sectionTitle">Track Payments</div>
          <div class="row" style="gap:8px;margin-bottom:10px">
            <button class="pill" data-filter="all" type="button">All</button>
            <button class="pill" data-filter="pending" type="button">Pending</button>
            <button class="pill" data-filter="paid" type="button">Paid</button>
            <button class="pill" data-filter="transfers" type="button">Transfers</button>
          </div>
          <div class="list" id="trackList">
            <div class="item"><div class="meta"><div class="name">${t('loading')}</div><div class="sub muted">...</div></div></div>
          </div>
        </div>
      `;
      let filter = 'all';
      host.querySelectorAll('[data-filter]').forEach((b) => {
        b.onclick = () => { filter = b.dataset.filter; load(); };
      });
      async function load() {
        const list = document.getElementById('trackList');
        list.innerHTML = `<div class="item"><div class="meta"><div class="name">${t('loading')}</div><div class="sub muted">...</div></div></div>`;
        try{
          const invRes = await fetch(`/invoices/${encodeURIComponent(freelancer.id)}`, { headers: await getAuthHeaders(), cache:'no-store' });
          const invJson = await invRes.json().catch(() => ({}));
          const invoices = invRes.ok ? (invJson.invoices || []) : [];
          const trRes = await fetch(`/transfers/history?senderId=${encodeURIComponent(freelancer.id)}`, { headers: await getAuthHeaders(), cache:'no-store' });
          const trJson = await trRes.json().catch(() => ({}));
          const transfers = trRes.ok ? (trJson.transfers || []) : [];

          const rows = [];
          if (filter !== 'transfers') {
            for (const inv of invoices) {
              if (filter === 'paid' && inv.status !== 'paid') continue;
              if (filter === 'pending' && inv.status === 'paid') continue;
              rows.push({
                kind:'invoice',
                name: inv.client_name || inv.client_email || inv.client_phone || 'Invoice',
                amount: Number(inv.amount || 0),
                status: inv.status || 'pending',
                date: inv.created_at || inv.updated_at || new Date().toISOString()
              });
            }
          }
          if (filter === 'all' || filter === 'transfers') {
            for (const tr of transfers) {
              rows.push({
                kind:'transfer',
                name: tr.recipient_phone_or_email || tr.recipient_id || 'Transfer',
                amount: Number(tr.amount || 0),
                status:'transfer',
                date: tr.created_at || new Date().toISOString()
              });
            }
          }
          rows.sort((a,b) => new Date(b.date) - new Date(a.date));
          if (!rows.length) {
            list.innerHTML = `<div class="item"><div class="meta"><div class="name">No records</div><div class="sub muted">Try another filter</div></div></div>`;
            return;
          }
          list.innerHTML = rows.slice(0, 50).map(r => {
            const who = r.name;
            const ini = initials(who);
            const badgeText = r.kind === 'transfer' ? 'TR' : ini;
            let cls = 'warn', label = t('pending');
            if (r.kind === 'transfer') { cls='out'; label='Transfer'; }
            else if (String(r.status).toLowerCase()==='paid') { cls='ok'; label=t('paid'); }
            return `
              <div class="item">
                <div class="badge">${escapeHtml(badgeText)}</div>
                <div class="meta">
                  <div class="name">${escapeHtml(who)}</div>
                  <div class="sub">${escapeHtml(label)} • ${new Date(r.date).toLocaleDateString()}</div>
                </div>
                <div class="amt ${cls}">${(r.kind==='transfer' ? '-' : '')}${formatMoneyNGN(r.amount)}</div>
              </div>
            `;
          }).join('');
        } catch(err) {
          list.innerHTML = `<div class="item"><div class="meta"><div class="name">${t('error')}</div><div class="sub muted">${escapeHtml(err.message)}</div></div></div>`;
        }
      }
      load();
    }

        b.innerHTML = `${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
        chatBody.appendChild(b);
        chatBody.scrollTop = chatBody.scrollHeight;
      }

      async function send() {
        const text = chatInput.value.trim();
        if (!text || chatLoading) return;
        chatInput.value = '';
        chatInput.style.height = 'auto';
        addBubble(text, 'sent');
        chatLoading = true;
        chatSend.disabled = true;
        try{
          const res = await fetch('/chat', {
            method:'POST',
            headers: await getAuthHeaders(),
            body: JSON.stringify({
              message: text,
              messages,
              freelancer_id: freelancer.id,
              freelancer_email: freelancer.email,
              freelancer_name: freelancer.name,
            })
          });
          const j = await res.json();
          if (!res.ok) throw new Error(j.error || 'Chat failed');
          messages = j.messages || messages;
          addBubble(j.reply || 'Done', 'received');
        } catch(err) {
          addBubble(`${t('error')}: ${err.message}`, 'received');
        } finally {
          chatLoading = false;
          chatSend.disabled = false;
        }
      }
    }

    function renderSettings() {
      setActiveTab('settings');
      host.innerHTML = `
        <div class="screen">
          <div class="sectionTitle">${t('Settings') || 'Settings'}</div>
          <div class="card" style="padding:14px">
            <div class="row">
              <div class="col" style="gap:2px">
                <div style="font-weight:900">Language</div>
                <div class="muted" style="font-size:12px">EN ←→ PID</div>
              </div>
              <div class="spacer"></div>
              <button class="btn secondary" type="button" id="toggleBtn">${getLang().toUpperCase()}</button>
            </div>
            <div style="height:12px"></div>
            <button class="btn secondary" type="button" id="logoutBtn">Log out</button>
          </div>
        </div>
      `;
      document.getElementById('toggleBtn').onclick = () => langToggle.click();
      document.getElementById('logoutBtn').onclick = async () => { if (window.Clerk) await window.Clerk.signOut(); };
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text ?? '');
      return div.innerHTML.replace(/\\n/g, '<br>');
    }
    function escapeAttr(text) {
      return String(text ?? '').replace(/\"/g, '&quot;');
    }

    function mountClerkAuth() {
      if (!window.Clerk || clerkSignInMounted) return;
      clerkAuthEl.innerHTML = `
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">
          <button type="button" id="showSignIn" style="flex:1;padding:10px;border-radius:14px;border:none;background:#00a884;color:#fff;cursor:pointer;font-size:14px;font-weight:800;">Sign in</button>
          <button type="button" id="showSignUp" style="flex:1;padding:10px;border-radius:14px;border:1px solid #2a3942;background:#1f2c34;color:#e9edef;cursor:pointer;font-size:14px;font-weight:800;">Sign up</button>
        </div>
        <div id="clerk-sign-in"></div>
        <div id="clerk-sign-up" style="display:none;"></div>
      `;

      const signInHost = document.getElementById('clerk-sign-in');
      const signUpHost = document.getElementById('clerk-sign-up');
      const clerkAppearance = {
        variables: {
          colorBackground: '#1f2c34',
          colorInputBackground: '#2a3942',
          colorInputText: '#e9edef',
          colorPrimary: '#00a884',
          colorText: '#e9edef',
          colorTextSecondary: '#8696a0',
        },
      };

      if (clerkSignInMounted) window.Clerk.unmountSignIn(signInHost);
      if (clerkSignUpMounted) window.Clerk.unmountSignUp(signUpHost);

      window.Clerk.mountSignIn(signInHost, { appearance: clerkAppearance });
      window.Clerk.mountSignUp(signUpHost, { appearance: clerkAppearance });
      clerkSignInMounted = true;
      clerkSignUpMounted = true;

      document.getElementById('showSignIn').addEventListener('click', () => {
        signInHost.style.display = 'block';
        signUpHost.style.display = 'none';
        document.getElementById('showSignIn').style.background = '#00a884';
        document.getElementById('showSignIn').style.color = '#fff';
        document.getElementById('showSignUp').style.background = '#1f2c34';
        document.getElementById('showSignUp').style.color = '#e9edef';
      });

      document.getElementById('showSignUp').addEventListener('click', () => {
        signInHost.style.display = 'none';
        signUpHost.style.display = 'block';
        document.getElementById('showSignUp').style.background = '#00a884';
        document.getElementById('showSignUp').style.color = '#fff';
        document.getElementById('showSignIn').style.background = '#1f2c34';
        document.getElementById('showSignIn').style.color = '#e9edef';
      });
    }

    async function loadClerkScript(publishableKey) {
      return new Promise((resolve, reject) => {
        if (window.Clerk) return resolve();
        const script = document.createElement('script');
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.setAttribute('data-clerk-publishable-key', publishableKey);
        script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load Clerk'));
        document.head.appendChild(script);
      });
    }

    async function init() {
      langToggle.textContent = getLang().toUpperCase();
      try {
        const configRes = await fetch('/config');
        const { clerkPublishableKey } = await configRes.json();
        if (!clerkPublishableKey) {
          authLoading.textContent = 'Clerk is not configured. Add CLERK_PUBLISHABLE_KEY to .env';
          return;
        }
        await loadClerkScript(clerkPublishableKey);
        await window.Clerk.load();
        authLoading.style.display = 'none';

        window.Clerk.addListener(async ({ user }) => {
          if (!user) {
            authScreen.classList.remove('hidden');
            appEl.classList.add('hidden');
            mountClerkAuth();
            return;
          }
          freelancer = getFreelancerFromClerk();
          avatarEl.textContent = initials(freelancer.name);
          authScreen.classList.add('hidden');
          appEl.classList.remove('hidden');
          render();
        });

        if (window.Clerk.user) {
          freelancer = getFreelancerFromClerk();
          avatarEl.textContent = initials(freelancer.name);
          authScreen.classList.add('hidden');
          appEl.classList.remove('hidden');
          render();
        } else {
          mountClerkAuth();
        }
      } catch (err) {
        authLoading.textContent = `Failed to initialize: ${err.message}`;
      }
    }

    init();
  </script>
</body>
</html>
